name: CI - Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # Vamos definir o nome da imagem como o caminho do repositório, mas em letras minúsculas abaixo
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TRUQUE DE DEVOPS: Converter o nome do repositório para minúsculas
      - name: Lowercase IMAGE_NAME
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Usamos a variável em minúsculo aqui
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # ATENÇÃO AQUI: Se o seu Dockerfile está na raiz do projeto, use "."
          # Se ele estiver dentro de uma pasta chamada backend, mantenha "./backend"
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}